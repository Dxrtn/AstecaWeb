<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Asteca - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <h1 class="logo">Asteca Contabilidade</h1>
            <nav class="navbar">
                <a class="nav-opt" href="start.html">Início</a>
                <a class="nav-opt" href="">Login</a>
                <a class="nav-opt" href="">Cadastro</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="main-login">
            <div class="login-container">
                <div class="container-content">
                    <h2>Entrar na sua conta</h2>
                    <h5>Faça login para ter acesso às ferramentas</h5>
                </div>
                <div = class="form-content">
                    <div class="email-content">
                        <label for="email">E-mail</label>
                        <input class= "email" type="email" placeholder="Seu e-mail aqui">
                    </div>
                    <div = class="pass-content">
                        <label for="password">Senha</label>
                        <input class= "password" type="password" placeholder="Sua senha aqui">
                    </div>
                    <a href="">Esqueceu sua senha?</a>
                </div>
            </div>
                
                
        </section>
        </main>
</body>
</html>
